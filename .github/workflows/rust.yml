name: Rust

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - 'clippy.toml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - 'clippy.toml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup clippy
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target

      - name: Run clippy
        run: cargo clippy --verbose --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target

      - name: Run tests
        run: cargo test --verbose --all-features

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup rustfmt
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Run format check
        run: cargo fmt --check

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build documentation
        run: cargo doc --workspace --no-deps --all-features
